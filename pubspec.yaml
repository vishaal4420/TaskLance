name: tasklance
description: TaskLance - Freelance Project Management & Milestone Tracking
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.5
  # Auth
  google_sign_in: ^6.2.2
  flutter_appauth: ^8.0.1
  # Network
  dio: ^5.8.0+1
  # Local storage
  hive_flutter: ^1.1.0
  # Charts
  fl_chart: ^0.70.2
  # Animations
  lottie: ^3.3.1
  # Images
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  # Files
  file_picker: ^8.0.0
  share_plus: ^10.1.4
  # PDF
  pdf: ^3.11.3
  # Notifications
  flutter_local_notifications: ^18.0.1
  # Connectivity
  connectivity_plus: ^6.1.4
  # Utils
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  pin_code_fields: ^8.0.1
  # Razorpay
  razorpay_flutter: ^1.3.7
  # Shimmer effect
  shimmer: ^3.0.0

dependency_overrides: {}

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.4.0
  json_serializable: ^6.9.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
